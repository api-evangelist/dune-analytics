specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Dune Analytics
providerId: dune-analytics
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Web3
  - Analytics
  - Rate Limiting
description: >-
  Dune meters API usage by credits rather than per-second/per-minute caps for most endpoints.
  Each query execution consumes credits based on the performance tier (Medium / Large) and
  resources used. Data export consumes credits per MB returned (e.g. 20 credits/MB on Free,
  2 credits/MB on Plus). Concurrent execution caps and per-key rate limits are tier-dependent.
notes: Dune publishes its limits primarily through credit cost, not RPS. Concurrent execution
  cap on Free is typically 1; higher tiers permit more.
sources:
  - https://docs.dune.com/api-reference/overview/billing
  - https://dune.com/pricing
responseCodes:
  throttled: 429
limits:
  - name: Concurrent executions (Free)
    scope: api_key
    metric: concurrent_executions
    limit: 1
  - name: Concurrent executions (Plus)
    scope: api_key
    metric: concurrent_executions
    limit: 5
  - name: Concurrent executions (Premium)
    scope: api_key
    metric: concurrent_executions
    limit: 10
  - name: Credit-based metering
    scope: api_key
    metric: credits_per_month
    limit: -1
    notes: Per-tier monthly allowance; over-credit calls are rejected or billed as overage on Enterprise.
policies:
  - name: Credit cost per call
    description: Inspect execution_id response and pull credit usage from billing endpoints.
  - name: Failure billing
    description: Failed query executions still consume credits; gate retries.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
