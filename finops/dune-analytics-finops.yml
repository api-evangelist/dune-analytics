specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Dune Analytics
providerId: dune-analytics
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Web3
  - Analytics
  - FinOps
  - FOCUS
description: >-
  FinOps view of Dune. Subscription tier governs monthly credit allowance; credits are consumed
  by query executions, data exports, and writes. Plan-tier export rate (e.g. 20 vs 2 credits/MB)
  materially changes effective cost. Failed executions still count.
sources:
  - https://docs.dune.com/api-reference/overview/billing
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Dune
serviceCategory: Crypto Analytics
billingModel:
  pricingCategory: Subscription with Metered Credit Allowance
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Subscription
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Dune API
  ServiceCategory: Crypto Analytics
  ProviderName: Dune
  PublisherName: Dune
  InvoiceIssuerName: Dune
  BillingCurrency: USD
  ChargeCategory: Subscription
meters:
  - name: subscription
    description: Monthly subscription per workspace.
    unit: month
    aggregation: sum
    dimensions:
      - workspace
  - name: query_execution_credits
    description: Credits consumed by query executions.
    unit: credit
    aggregation: sum
    dimensions:
      - workspace
      - query_id
      - performance_tier
  - name: export_credits
    description: Credits consumed by exporting data (per MB).
    unit: credit
    aggregation: sum
    dimensions:
      - workspace
principles:
  - name: Visibility
    description: Track credit usage per query and per consumer to forecast tier sufficiency.
  - name: Allocation
    description: Tag queries with consumer team to allocate credit usage on chargeback.
  - name: Optimization
    description: Right-size performance tier; cache results to avoid re-execution; gate retries.
  - name: Accountability
    description: Assign a billing owner per workspace; review monthly credit-vs-allowance.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
