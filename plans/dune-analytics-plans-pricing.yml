specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Dune Analytics
providerId: dune-analytics
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Web3
  - Analytics
  - Plans
description: >-
  Dune offers four plan tiers: Free, Plus (~$390/month), Premium (~$1,990/month), and Enterprise.
  Each tier includes a monthly credit allowance; query executions, data exports, and data writes
  consume credits at varying rates. Per the docs, Free tier charges 20 credits per MB exported
  while Plus charges 2 credits per MB. Storage moves from 100 MB on Free to unlimited on
  Enterprise. Failed query executions are still billed.
notes: Headline plan prices are commonly cited from public sources; Dune's pricing page may
  update them. Re-verify at next refresh.
sources:
  - https://dune.com/pricing
  - https://docs.dune.com/api-reference/overview/billing
plans:
  - id: dune-free
    name: Free
    type: freemium
    description: Free tier - includes a small credit allowance and 100 MB storage.
    entries:
      - label: Monthly subscription
        name: free_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Storage
        name: free_storage
        type: quota
        metric: megabyte
        limit: 100
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Query execution and small data export
      - name: 100 MB storage
  - id: dune-plus
    name: Plus
    type: subscription
    description: Approximately $390/month - more credits, lower per-MB export rate, more storage.
    entries:
      - label: Monthly subscription
        name: plus_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '390.00'
        userMultiplied: false
    elements:
      - name: Higher credit allowance
      - name: 2 credits per MB exported
  - id: dune-premium
    name: Premium
    type: subscription
    description: Approximately $1,990/month - high-performance executions and large allowance.
    entries:
      - label: Monthly subscription
        name: premium_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '1990.00'
        userMultiplied: false
    elements:
      - name: Large credit allowance
      - name: Larger query execution tier
  - id: dune-enterprise
    name: Enterprise
    type: enterprise
    description: Custom pricing - unlimited storage, Trino warehouse connector, dbt integration.
    entries:
      - label: Custom pricing
        name: enterprise_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: contract
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Trino connector
      - name: dbt integration
      - name: Unlimited storage
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
